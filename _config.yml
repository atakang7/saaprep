title: SAA-C03 Field Guide
description: Concept-first study guide for the AWS Solutions Architect Associate exam
theme: jekyll-theme-cayman
show_downloads: false

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

defaults:
  - scope:
      path: ""
    values:
      layout: default

include:
  - START-HERE.md

exclude:
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - CONTRIBUTING.md
  - CHANGELOG.md
  - DISCLAIMER.md
  - LICENSE
  - quizzes/sample-exams/*.pdf
